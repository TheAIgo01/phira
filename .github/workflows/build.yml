name: Build Release

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  # ========== Linux 构建 ==========
  build-linux:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Cache FFmpeg
      id: cache-ffmpeg
      uses: actions/cache@v4
      with:
        path: prpr-avc/static-lib
        key: ffmpeg-static-linux-v1

    - name: Build FFmpeg Linux
      if: steps.cache-ffmpeg.outputs.cache-hit != 'true'
      run: |
        sudo apt-get update
        sudo apt-get install -y nasm yasm libtool automake autoconf cmake
        cd /tmp
        wget https://ffmpeg.org/releases/ffmpeg-6.0.tar.xz
        tar -xf ffmpeg-6.0.tar.xz
        cd ffmpeg-6.0
        ./configure \
          --prefix=/tmp/ffmpeg-build \
          --disable-programs --disable-doc --disable-debug --disable-asm \
          --enable-static --disable-shared \
          --enable-decoder='h264,aac,flac,mp3' \
          --enable-demuxer='mov,mp3' \
          --enable-protocol='file' \
          --disable-everything \
          --enable-swscale --enable-swresample
        make -j$(nproc)
        make install
        mkdir -p $GITHUB_WORKSPACE/prpr-avc/static-lib/x86_64-unknown-linux-gnu
        cp /tmp/ffmpeg-build/lib/*.a $GITHUB_WORKSPACE/prpr-avc/static-lib/x86_64-unknown-linux-gnu/

    - name: Install deps
      run: |
        sudo apt-get update
        sudo apt-get install -y libasound2-dev libssl-dev pkg-config \
          libwayland-dev libxkbcommon-dev libgtk-3-dev

    - name: Build
      run: cargo build --release --bin phira-main

    - name: Package
      run: |
        mkdir -p Phira-linux/assets
        cp -r assets/* Phira-linux/assets/
        cp target/release/phira-main Phira-linux/
        chmod +x Phira-linux/phira-main
        zip -r Phira-linux.zip Phira-linux/

    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: Phira-linux
        path: Phira-linux.zip

  # ========== Windows 构建 ==========
  # ========== Windows 构建 ==========
  build-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable

    # 修复：使用 GitHub 上的预编译 Windows 静态库（或自己编译）
    - name: Download FFmpeg Windows
      run: |
        # 创建目录
        mkdir -p prpr-avc/static-lib/x86_64-pc-windows-msvc
        cd prpr-avc/static-lib/x86_64-pc-windows-msvc
        
        # 下载 BtbN 的 Windows 静态库构建（更可靠）
        Invoke-WebRequest -Uri "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl-shared.zip" -OutFile "ffmpeg.zip"
        Expand-Archive -Path "ffmpeg.zip" -DestinationPath "." -Force
        
        # 找到 lib 目录并复制文件（修复语法错误）
        $libDir = Get-ChildItem -Path "." -Filter "lib" -Directory -Recurse | Select-Object -First 1
        if ($libDir) {
          Copy-Item "$($libDir.FullName)\*.lib" "." -Force
          Write-Host "Found and copied .lib files"
        } else {
          Write-Host "Warning: No lib directory found"
        }
        
        # 同时复制 dll 到输出目录（运行时需要）
        $binDir = Get-ChildItem -Path "." -Filter "bin" -Directory -Recurse | Select-Object -First 1
        if ($binDir) {
          Copy-Item "$($binDir.FullName)\*.dll" "." -Force
        }
      shell: pwsh

    - name: Build
      run: cargo build --release --bin phira-main

    - name: Package
      run: |
        mkdir Phira-windows
        xcopy assets Phira-windows\assets\ /E /I /Q
        copy target\release\phira-main.exe Phira-windows\
        # 复制 FFmpeg DLL（运行时需要）
        copy prpr-avc\static-lib\x86_64-pc-windows-msvc\*.dll Phira-windows\ 2>nul || echo "No DLL found"
        # 压缩
        7z a -tzip Phira-windows.zip Phira-windows\
      shell: cmd

    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: Phira-windows
        path: Phira-windows.zip

  # ========== Android 构建 ==========
  build-android:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    # 关键：安装 Android Rust target
    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: aarch64-linux-android,armv7-linux-androideabi

    - name: Setup NDK
      uses: nttld/setup-ndk@v1
      with:
        ndk-version: r27c

    - name: Install cargo-ndk
      run: cargo install cargo-ndk

    # Android 需要特殊编译 FFmpeg（或使用预编译版本）
    - name: Download FFmpeg Android
      run: |
        mkdir -p prpr-avc/static-lib/aarch64-linux-android
        mkdir -p prpr-avc/static-lib/armv7-linux-androideabi
        # 这里需要下载 Android 版 FFmpeg 静态库
        # 暂时使用占位，实际需要从原项目或自己编译
        echo "注意：Android 需要 aarch64 和 armv7 架构的 FFmpeg 静态库"
        echo "可以从原项目 Release 下载 prpr-avc.zip 获取"

    - name: Build ARM64
      run: cargo ndk -t arm64-v8a --platform 35 build --release
      continue-on-error: true  # 如果缺少静态库，先不中断

    - name: Build ARMv7
      run: cargo ndk -t armeabi-v7a --platform 35 build --release
      continue-on-error: true

    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: Phira-android
        path: |
          target/aarch64-linux-android/release/libphira.so
          target/armv7-linux-androideabi/release/libphira.so
        if-no-files-found: warn
