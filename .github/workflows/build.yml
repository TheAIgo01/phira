name: Build Release

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]  # 推送tag时也构建
  workflow_dispatch:

jobs:
  build-desktop:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            name: linux
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            name: windows

    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4

    # Linux 依赖
    - name: Install dependencies (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y libasound2-dev libssl-dev pkg-config \
          libwayland-dev libxkbcommon-dev libgtk-3-dev
        
        # 编译FFmpeg静态库（Linux only）
        sudo apt-get install -y nasm yasm libtool automake autoconf cmake
        mkdir -p /tmp/ffmpeg-build && cd /tmp
        wget https://ffmpeg.org/releases/ffmpeg-6.0.tar.xz
        tar -xf ffmpeg-6.0.tar.xz && cd ffmpeg-6.0
        ./configure \
          --prefix=/tmp/ffmpeg-build \
          --disable-programs --disable-doc --disable-debug --disable-asm \
          --enable-static --disable-shared \
          --enable-decoder='h264,aac,flac,mp3' \
          --enable-demuxer='mov,mp3' \
          --enable-protocol='file' \
          --disable-everything \
          --enable-swscale --enable-swresample
        make -j$(nproc) && make install
        mkdir -p $GITHUB_WORKSPACE/prpr-avc/static-lib/x86_64-unknown-linux-gnu
        cp /tmp/ffmpeg-build/lib/*.a $GITHUB_WORKSPACE/prpr-avc/static-lib/x86_64-unknown-linux-gnu/

    # Windows 依赖（使用预编译FFmpeg）
    - name: Setup FFmpeg (Windows)
      if: matrix.os == 'windows-latest'
      run: |
        choco install pkgconfiglite
        # 下载Windows静态库（需要自己准备或从原项目获取）

    - name: Build
      run: cargo build --release --bin phira-main

    # Linux 打包
    - name: Package (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: |
        mkdir -p Phira-linux-v${{ github.ref_name }}/assets
        cp -r assets/* Phira-linux-v${{ github.ref_name }}/assets/
        cp target/release/phira-main Phira-linux-v${{ github.ref_name }}/
        chmod +x Phira-linux-v${{ github.ref_name }}/phira-main
        tar czf Phira-linux-v${{ github.ref_name }}.tar.gz Phira-linux-v${{ github.ref_name }}/
        
    # Windows 打包（包含DLL）
    - name: Package (Windows)
      if: matrix.os == 'windows-latest'
      run: |
        New-Item -ItemType Directory -Force -Path Phira-windows-v${{ env.VERSION }}\assets
        Copy-Item -Recurse assets\* Phira-windows-v${{ env.VERSION }}\assets\
        Copy-Item target\release\phira-main.exe Phira-windows-v${{ env.VERSION }}\
        # 如果有DLL也复制过来
        Compress-Archive -Path Phira-windows-v${{ env.VERSION }} -DestinationPath Phira-windows-v${{ env.VERSION }}.zip

    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: Phira-${{ matrix.name }}
        path: |
          Phira-*.tar.gz
          Phira-*.zip

  build-android:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup NDK
      uses: nttld/setup-ndk@v1
      with:
        ndk-version: r27c
        
    - name: Install cargo-ndk
      run: cargo install cargo-ndk
      
    - name: Build
      run: cargo ndk -t arm64-v8a -t armeabi-v7a --platform 35 build --release
      
    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: Phira-android
        path: |
          target/aarch64-linux-android/release/libphira.so
          target/armv7-linux-androideabi/release/libphira.so
