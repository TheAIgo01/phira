name: Build Release

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  # ========== Linux 构建 ==========
  build-linux:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Cache FFmpeg
      id: cache-ffmpeg
      uses: actions/cache@v4
      with:
        path: prpr-avc/static-lib
        key: ffmpeg-static-linux-v2

    - name: Build FFmpeg Linux
      if: steps.cache-ffmpeg.outputs.cache-hit != 'true'
      run: |
        sudo apt-get update
        sudo apt-get install -y nasm yasm libtool automake autoconf cmake
        cd /tmp
        wget https://ffmpeg.org/releases/ffmpeg-6.0.tar.xz
        tar -xf ffmpeg-6.0.tar.xz
        cd ffmpeg-6.0
        ./configure \
          --prefix=/tmp/ffmpeg-build \
          --disable-programs --disable-doc --disable-debug --disable-asm \
          --enable-static --disable-shared \
          --disable-zlib \  # 禁用zlib避免Windows类似问题
          --enable-decoder='h264,aac,flac,mp3' \
          --enable-demuxer='mov,mp3' \
          --enable-protocol='file' \
          --disable-everything \
          --enable-swscale --enable-swresample
        make -j$(nproc)
        make install
        mkdir -p $GITHUB_WORKSPACE/prpr-avc/static-lib/x86_64-unknown-linux-gnu
        cp /tmp/ffmpeg-build/lib/*.a $GITHUB_WORKSPACE/prpr-avc/static-lib/x86_64-unknown-linux-gnu/

    - name: Install deps
      run: |
        sudo apt-get update
        sudo apt-get install -y libasound2-dev libssl-dev pkg-config \
          libwayland-dev libxkbcommon-dev libgtk-3-dev

    - name: Build
      run: cargo build --release --bin phira-main

    - name: Package
      run: |
        mkdir -p Phira-linux/assets
        cp -r assets/* Phira-linux/assets/
        cp target/release/phira-main Phira-linux/
        chmod +x Phira-linux/phira-main
        zip -r Phira-linux.zip Phira-linux/

    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: Phira-linux
        path: Phira-linux.zip

  # ========== Windows 构建（修复zlib） ==========
  build-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable

    # 修复：使用vcpkg安装ffmpeg（包含所有依赖包括zlib）
    - name: Install FFmpeg (vcpkg)
      run: |
        git clone https://github.com/microsoft/vcpkg.git
        .\vcpkg\bootstrap-vcpkg.bat
        .\vcpkg\vcpkg install ffmpeg:x64-windows-static --triplet x64-windows-static
        # 设置环境变量让cargo找到库
        echo "VCPKG_ROOT=$PWD\vcpkg" >> $env:GITHUB_ENV
        echo "LIB=$PWD\vcpkg\installed\x64-windows-static\lib" >> $env:GITHUB_ENV
        echo "INCLUDE=$PWD\vcpkg\installed\x64-windows-static\include" >> $env:GITHUB_ENV

    - name: Build
      run: cargo build --release --bin phira-main
      env:
        PKG_CONFIG_PATH: "${{ github.workspace }}\\vcpkg\\installed\\x64-windows-static\\lib\\pkgconfig"
        RUSTFLAGS: "-L ${{ github.workspace }}\\vcpkg\\installed\\x64-windows-static\\lib"

    - name: Package
      run: |
        mkdir Phira-windows
        xcopy assets Phira-windows\assets\ /E /I /Q
        copy target\release\phira-main.exe Phira-windows\
        # 复制vcpkg的DLL（虽然是静态链接，但某些系统库可能仍需）
        copy vcpkg\installed\x64-windows-static\bin\*.dll Phira-windows\ 2>nul || echo "Static build, no DLL needed"
        7z a -tzip Phira-windows.zip Phira-windows\

    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: Phira-windows
        path: Phira-windows.zip

  # ========== Android 构建（修复target） ==========
  build-android:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    # 关键修复：显式安装Rust target
    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: aarch64-linux-android,armv7-linux-androideabi

    - name: Setup NDK
      uses: nttld/setup-ndk@v1
      with:
        ndk-version: r27c

    - name: Install cargo-ndk
      run: cargo install cargo-ndk

    # 创建空的静态库目录（如果找不到原项目的静态库）
    - name: Prepare static libs
      run: |
        mkdir -p prpr-avc/static-lib/aarch64-linux-android
        mkdir -p prpr-avc/static-lib/armv7-linux-androideabi
        # 注意：Android需要交叉编译的FFmpeg静态库，这里需要你自己提供
        # 或者从原项目Release下载prpr-avc.zip解压

    - name: Build ARM64
      run: cargo ndk -t arm64-v8a --platform 35 build --release
      continue-on-error: true  # 如果缺少静态库，先不中断

    - name: Build ARMv7
      run: cargo ndk -t armeabi-v7a --platform 35 build --release
      continue-on-error: true

    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: Phira-android
        path: |
          target/aarch64-linux-android/release/libphira.so
          target/armv7-linux-androideabi/release/libphira.so
        if-no-files-found: warn
