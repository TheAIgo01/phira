name: Build Release

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  # ========== Linux 构建 ==========
  build-linux:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Cache FFmpeg Linux
      id: cache-ffmpeg
      uses: actions/cache@v4
      with:
        path: prpr-avc/static-lib/x86_64-unknown-linux-gnu
        key: ffmpeg-linux-v1

    - name: Build FFmpeg Linux
      if: steps.cache-ffmpeg.outputs.cache-hit != 'true'
      run: |
        sudo apt-get update
        sudo apt-get install -y nasm yasm libtool automake autoconf cmake
        cd /tmp
        wget https://ffmpeg.org/releases/ffmpeg-6.0.tar.xz
        tar -xf ffmpeg-6.0.tar.xz
        cd ffmpeg-6.0
        ./configure \
          --prefix=/tmp/ffmpeg-build \
          --disable-programs \
          --disable-doc \
          --disable-debug \
          --disable-asm \
          --enable-static \
          --disable-shared \
          --disable-zlib \
          --enable-decoder='h264,aac,flac,mp3' \
          --enable-demuxer='mov,mp3' \
          --enable-protocol='file' \
          --disable-everything \
          --enable-swscale \
          --enable-swresample
        make -j$(nproc)
        make install
        mkdir -p $GITHUB_WORKSPACE/prpr-avc/static-lib/x86_64-unknown-linux-gnu
        cp /tmp/ffmpeg-build/lib/*.a $GITHUB_WORKSPACE/prpr-avc/static-lib/x86_64-unknown-linux-gnu/

    - name: Install deps
      run: |
        sudo apt-get update
        sudo apt-get install -y libasound2-dev libssl-dev pkg-config \
          libwayland-dev libxkbcommon-dev libgtk-3-dev

    - name: Build
      run: cargo build --release --bin phira-main

    - name: Package
      run: |
        mkdir -p Phira-linux/assets
        cp -r assets/* Phira-linux/assets/
        cp target/release/phira-main Phira-linux/
        chmod +x Phira-linux/phira-main
        zip -r Phira-linux.zip Phira-linux/

    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: Phira-linux
        path: Phira-linux.zip

  # ========== Windows 构建 ==========
  build-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Setup vcpkg manually
      run: |
        git clone https://github.com/microsoft/vcpkg.git C:\vcpkg
        C:\vcpkg\bootstrap-vcpkg.bat
        echo "VCPKG_ROOT=C:\vcpkg" >> $env:GITHUB_ENV
        echo "PATH=C:\vcpkg;$env:PATH" >> $env:GITHUB_ENV

    - name: Install FFmpeg (vcpkg)
      shell: pwsh
      run: |
        vcpkg install ffmpeg:x64-windows-static --triplet x64-windows-static

    - name: Build
      env:
        PKG_CONFIG_PATH: 'C:/vcpkg/installed/x64-windows-static/lib/pkgconfig'
        FFMPEG_DIR: 'C:/vcpkg/installed/x64-windows-static'
      run: cargo build --release --bin phira-main

    - name: Package
      run: |
        mkdir Phira-windows
        xcopy assets Phira-windows\assets\ /E /I /Q
        copy target\release\phira-main.exe Phira-windows\
        7z a -tzip Phira-windows.zip Phira-windows\

    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: Phira-windows
        path: Phira-windows.zip

  # ========== Android 构建 ==========
  build-android:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: aarch64-linux-android,armv7-linux-androideabi

    - name: Setup NDK
      uses: nttld/setup-ndk@v1
      with:
        ndk-version: r27c
        link-to-sdk: true

    - name: Install cargo-apk
      run: cargo install cargo-apk

    - name: Cache FFmpeg Android
      id: cache-ffmpeg-android
      uses: actions/cache@v4
      with:
        path: prpr-avc/static-lib
        key: ffmpeg-android-v2

    - name: Build FFmpeg Android
      if: steps.cache-ffmpeg-android.outputs.cache-hit != 'true'
      run: |
        sudo apt-get update
        sudo apt-get install -y nasm yasm libtool automake autoconf cmake
        
        export NDK=$ANDROID_NDK_HOME
        export TOOLCHAIN=$NDK/toolchains/llvm/prebuilt/linux-x86_64
        export API=21
        
        mkdir -p $GITHUB_WORKSPACE/prpr-avc/static-lib/aarch64-linux-android
        mkdir -p $GITHUB_WORKSPACE/prpr-avc/static-lib/armv7-linux-androideabi
        
        cd /tmp
        wget https://ffmpeg.org/releases/ffmpeg-6.0.tar.xz
        tar -xf ffmpeg-6.0.tar.xz
        cd ffmpeg-6.0
        
        # ARM64
        ./configure \
          --prefix=/tmp/ffmpeg-android-arm64 \
          --enable-static \
          --disable-shared \
          --disable-doc \
          --disable-programs \
          --disable-debug \
          --disable-asm \
          --enable-cross-compile \
          --target-os=android \
          --arch=arm64 \
          --cpu=armv8-a \
          --cross-prefix=$TOOLCHAIN/bin/llvm- \
          --cc=$TOOLCHAIN/bin/aarch64-linux-android$API-clang \
          --cxx=$TOOLCHAIN/bin/aarch64-linux-android$API-clang++ \
          --sysroot=$TOOLCHAIN/sysroot \
          --extra-cflags="-fPIC" \
          --extra-ldflags="-Wl,--gc-sections" \
          --enable-decoder='h264,aac,flac,mp3' \
          --enable-demuxer='mov,mp3' \
          --enable-protocol='file' \
          --disable-everything \
          --enable-swscale \
          --enable-swresample
        make -j$(nproc)
        make install
        cp /tmp/ffmpeg-android-arm64/lib/*.a $GITHUB_WORKSPACE/prpr-avc/static-lib/aarch64-linux-android/
        make clean
        
        # ARMv7
        ./configure \
          --prefix=/tmp/ffmpeg-android-armv7 \
          --enable-static \
          --disable-shared \
          --disable-doc \
          --disable-programs \
          --disable-debug \
          --disable-asm \
          --enable-cross-compile \
          --target-os=android \
          --arch=arm \
          --cpu=armv7-a \
          --cross-prefix=$TOOLCHAIN/bin/llvm- \
          --cc=$TOOLCHAIN/bin/armv7a-linux-androideabi$API-clang \
          --cxx=$TOOLCHAIN/bin/armv7a-linux-androideabi$API-clang++ \
          --sysroot=$TOOLCHAIN/sysroot \
          --extra-cflags="-fPIC" \
          --extra-ldflags="-Wl,--gc-sections" \
          --enable-decoder='h264,aac,flac,mp3' \
          --enable-demuxer='mov,mp3' \
          --enable-protocol='file' \
          --disable-everything \
          --enable-swscale \
          --enable-swresample
        make -j$(nproc)
        make install
        cp /tmp/ffmpeg-android-armv7/lib/*.a $GITHUB_WORKSPACE/prpr-avc/static-lib/armv7-linux-androideabi/

    - name: Build APK
      run: |
        mkdir -p assets
        cargo apk build --release
        
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Phira-android-apk
        path: target/release/apk/*.apk
        if-no-files-found: warn
